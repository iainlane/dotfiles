# Bump the locally packaged tools and the tag-pinned flake inputs, gathering
# every bump from one run into a single pull request. Each updater is
# `nix run .#update-<name>`, defined in `pkgs/build-support/updaters.nix` and
# surfaced by `flake/parts/updaters.nix`.
#
# `flake-update.yml` handles the mutable inputs that `nix flake update` can move
# on its own; this workflow owns everything with a pinned version: the `pkgs/`
# packages and inputs pinned to an immutable release tag, such as hermes-agent.
#
# The updaters run in one job: each only fetches assets and records
# platform-independent hashes, so a single run produces correct results for
# every system, and an arm64 runner avoids the queue for `ubuntu-latest`.
#
# As with `flake-update.yml`, a PR opened with the default `GITHUB_TOKEN` does
# not trigger other workflows. Set a `FLAKE_UPDATE_TOKEN` secret to have the PR
# run CI like any other.
name: package update

on:
  schedule:
    - cron: "20 4 * * 2,4" # Tuesdays and Thursdays, 04:20 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: package-update
  cancel-in-progress: true

jobs:
  update:
    name: Update packages
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write # push the package-update branch with the bumps
      pull-requests: write # open or refresh the package-update pull request
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      # The `secrets` input lives in the private dotfiles-secrets repo, reachable
      # only over SSH. Configure the read-only deploy key so evaluating the flake
      # (and any re-lock an updater performs) can read it, the same key the
      # cupboard and flake-update workflows use.
      - name: Set up secrets access
        env:
          DEPLOY_KEY: ${{ secrets.SECRETS_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          key="${RUNNER_TEMP}/secrets_deploy_key"
          install -m 600 /dev/null "${key}"
          printf '%s\n' "${DEPLOY_KEY}" > "${key}"
          echo "GIT_SSH_COMMAND=ssh -i ${key} -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=${RUNNER_TEMP}/known_hosts" >> "${GITHUB_ENV}"

      # Run every updater, keeping going when one fails so an upstream outage
      # does not block the others. A successful bump is staged; a failed one is
      # reverted, so a partial write never reaches the commit. Each bump's new
      # version is recorded for the pull request body.
      - name: Run the updaters
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          names="$(nix eval --raw .#updaterNames --apply 'names: builtins.concatStringsSep "\n" names')"

          : > "${RUNNER_TEMP}/changed.txt"
          : > "${RUNNER_TEMP}/failed.txt"

          for name in ${names}; do
            echo "::group::update-${name}"

            if ! nix run ".#update-${name}"; then
              echo "::warning::update-${name} failed; leaving it unchanged"
              printf '%s\n' "${name}" >> "${RUNNER_TEMP}/failed.txt"
              git checkout -- .
              echo '::endgroup::'
              continue
            fi

            if git diff --quiet; then
              echo "${name} already current."
              echo '::endgroup::'
              continue
            fi

            # Packages expose their version on the flake; a tag-pinned input does
            # not, so fall back to the tag now written into flake.nix.
            version="$(nix eval --raw ".#${name}.version" 2>/dev/null || true)"
            if [[ -z "${version}" ]]; then
              version="$(grep -oE "github:[^\"]*/${name}/[^\"]+" flake.nix | head -n1 | sed 's#.*/##' || true)"
            fi

            printf '%s %s\n' "${name}" "${version}" >> "${RUNNER_TEMP}/changed.txt"
            git add -A

            echo '::endgroup::'
          done

      - name: Open or update the pull request
        env:
          GH_TOKEN: ${{ secrets.FLAKE_UPDATE_TOKEN || github.token }}
        run: |
          set -euo pipefail

          if git diff --cached --quiet; then
            echo "All packages current; nothing to propose."
            exit 0
          fi

          gh auth setup-git

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          branch="package-update/$(date -u +%Y-%m-%d)"
          export branch

          # Keep a single update in flight: close any earlier package-update PRs
          # and delete their branches, then sweep up any branches left without a
          # PR.
          gh pr list --state open --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("package-update/")) | select(.headRefName != env.branch) | .number' \
            | while read -r number; do
                gh pr close "${number}" --delete-branch
              done

          git ls-remote --heads origin "refs/heads/package-update/*" \
            | sed 's#.*refs/heads/##' \
            | while read -r stale; do
                [ "${stale}" = "${branch}" ] && continue
                git push origin --delete "${stale}"
              done

          git switch -C "${branch}"
          git commit -m "chore(pkgs): update packages"
          git push --force origin "HEAD:refs/heads/${branch}"

          {
            echo "Automated package bumps from the scheduled \`package-update\` workflow."
            echo
            echo "Updated:"
            while read -r name version; do
              echo "- ${name} ${version}"
            done < "${RUNNER_TEMP}/changed.txt"

            if [[ -s "${RUNNER_TEMP}/failed.txt" ]]; then
              echo
              echo "Failed to update, left unchanged:"
              while read -r name; do
                echo "- ${name}"
              done < "${RUNNER_TEMP}/failed.txt"
            fi

            echo
            echo "Merging this publishes the rebuilt packages to the cupboard cache through the \`cupboard\` workflow's push-to-main build."
          } > "${RUNNER_TEMP}/body.md"

          if gh pr view "${branch}" --json state >/dev/null 2>&1; then
            gh pr edit "${branch}" --body-file "${RUNNER_TEMP}/body.md"
            echo "Existing pull request updated."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${branch}" \
            --title "chore(pkgs): update packages" \
            --label dependencies \
            --body-file "${RUNNER_TEMP}/body.md"
