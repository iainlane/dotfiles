# Relock the flake inputs on a schedule, and on demand, then open a pull
# request with the result. Merging that PR is what lands fresh builds in the
# cupboard cache: the push to main triggers the `cupboard` workflow, which
# rebuilds the updated closure and publishes it to the default cache.
#
# `nix flake update` cannot move the hermes-agent input on its own (it is pinned
# to an immutable release tag), so the hermes-agent bump script runs first, the
# same order `just update-flake` uses locally.
#
# A PR opened with the default `GITHUB_TOKEN` does not trigger other workflows,
# so the per-PR cupboard build will not run on it; merging to main still builds
# the closure into the default cache. Set a `FLAKE_UPDATE_TOKEN` secret (a PAT or
# GitHub App token) to have the PR trigger CI like any other.
name: flake update

on:
  schedule:
    - cron: "0 5 * * *" # Daily, 05:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: flake-update
  cancel-in-progress: true

jobs:
  update:
    name: Relock flake inputs and open a PR
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the flake-update branch with the relocked inputs
      pull-requests: write # open or refresh the flake-update pull request
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      # The `secrets` input lives in the private dotfiles-secrets repo, reachable
      # only over SSH. Configure the read-only deploy key so `nix flake update`
      # can relock it, the same key the cupboard workflow uses to build the host
      # and home closures.
      - name: Set up secrets access
        env:
          DEPLOY_KEY: ${{ secrets.SECRETS_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          key="${RUNNER_TEMP}/secrets_deploy_key"
          install -m 600 /dev/null "${key}"
          printf '%s\n' "${DEPLOY_KEY}" > "${key}"
          echo "GIT_SSH_COMMAND=ssh -i ${key} -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=${RUNNER_TEMP}/known_hosts" >> "${GITHUB_ENV}"

      - name: Relock flake inputs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ./scripts/update-hermes-agent.bash
          nix flake update

      - name: Open or update the pull request
        env:
          GH_TOKEN: ${{ secrets.FLAKE_UPDATE_TOKEN || github.token }}
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "Flake inputs already current; nothing to propose."
            exit 0
          fi

          gh auth setup-git

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          summary="$(./scripts/flake-lock-summary.bash <(git show HEAD:flake.lock) flake.lock)"

          branch="flake-update/$(date -u +%Y-%m-%d)"
          export branch

          # Keep a single relock in flight: close any earlier flake-update PRs and
          # delete their branches, then sweep up any branches left without a PR.
          gh pr list --state open --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("flake-update/")) | select(.headRefName != env.branch) | .number' \
            | while read -r number; do
                gh pr close "${number}" --delete-branch
              done

          git ls-remote --heads origin "refs/heads/flake-update/*" \
            | sed 's#.*refs/heads/##' \
            | while read -r stale; do
                [ "${stale}" = "${branch}" ] && continue
                git push origin --delete "${stale}"
              done

          git switch -C "${branch}"
          git commit -am "chore(flake): update inputs"
          git push --force origin "HEAD:refs/heads/${branch}"

          body="$(printf '%s\n' \
            "Automated relock of the flake inputs from the scheduled \`flake-update\` workflow: the hermes-agent release bump followed by \`nix flake update\`." \
            "" \
            "Updated inputs:" \
            "" \
            "${summary}" \
            "" \
            "Merging this publishes the rebuilt closure to the cupboard cache through the \`cupboard\` workflow's push-to-main build.")"

          if gh pr view "${branch}" --json state >/dev/null 2>&1; then
            gh pr edit "${branch}" --body "${body}"
            echo "Existing pull request updated."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${branch}" \
            --title "chore(flake): update inputs" \
            --label dependencies \
            --body "${body}"
